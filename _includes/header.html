<header class="site-header" role="banner">
  <div class="wrapper" style="display:flex; justify-content:space-between; align-items:center; max-width:680px; margin:0 auto; padding:16px 24px;">

<a style="font-family:-apple-system,sans-serif; font-size:20px; font-weight:700; color:#111; text-decoration:none; white-space:nowrap; margin-right:32px;" href="{{ "/" | relative_url }}">
      {{ site.title | escape }}
    </a>

    <nav style="display:flex; gap:16px; flex-wrap:wrap;">
      {% assign page_paths = site.header_pages %}
      {% for path in page_paths %}
        {% assign my_page = site.pages | where: "path", path | first %}
        {% if my_page.title %}
          <a style="font-family:-apple-system,sans-serif; font-size:14px; color:#555; text-decoration:none;" href="{{ my_page.url | relative_url }}">{{ my_page.title | escape }}</a>
        {% endif %}
      {% endfor %}
    </nav>

  </div>
</header>
