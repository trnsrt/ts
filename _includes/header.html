<header class="site-header" role="banner">
  <div style="max-width:680px; margin:0 auto; padding:20px 24px 0 24px;">

    <a style="font-family:-apple-system,sans-serif; font-size:20px; font-weight:700; color:#111; text-decoration:none; display:block; margin-bottom:12px;" href="{{ "/" | relative_url }}">
      {{ site.title | escape }}
    </a>

    <nav style="display:flex; flex-wrap:wrap; gap:8px 20px; padding-bottom:16px; border-bottom:1px solid #e8e8e8;">
      {% assign page_paths = site.header_pages %}
      {% for path in page_paths %}
        {% assign my_page = site.pages | where: "path", path | first %}
        {% if my_page.title %}
          <a style="font-family:-apple-system,sans-serif; font-size:14px; color:#555; text-decoration:none;" href="{{ my_page.url | relative_url }}">{{ my_page.title | escape }}</a>
        {% endif %}
      {% endfor %}
    </nav>

  </div>
</header>
