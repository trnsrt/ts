---
layout: default
---
<article style="max-width:680px; margin:0 auto; padding:48px 24px;">

  <header style="margin-bottom:32px; border-bottom:1px solid #e8e8e8; padding-bottom:24px;">
    <h1 style="font-family:-apple-system,sans-serif; font-size:36px; font-weight:700; color:#111; margin:0;">{{ page.title | escape }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

</article>
