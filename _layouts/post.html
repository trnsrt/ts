---
layout: default
---
<article style="max-width:680px; margin:0 auto; padding:48px 24px;">

  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
    <p class="post-meta">{{ page.date | date: "%b %d, %Y" }}</p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

</article>
