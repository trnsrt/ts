---
layout: default
---
<div style="max-width:680px; margin:0 auto; padding:48px 24px;">

  <header style="margin-bottom:32px; border-bottom:1px solid #e8e8e8; padding-bottom:24px;">
    <h1 style="font-family:-apple-system,sans-serif; font-size:36px; font-weight:700; color:#111; margin:0;">{{ page.tag }}</h1>
  </header>

  <ul style="list-style:none; margin:0; padding:0;">
    {% for post in site.tags[page.tag] %}
      <li style="border-bottom:1px solid #e8e8e8; padding:24px 0;">
        <span style="font-size:14px; color:#999; font-family:-apple-system,sans-serif; display:block; margin-bottom:6px;">{{ post.date | date: "%b %d, %Y" }}</span>
        <a style="font-size:20px; font-family:-apple-system,sans-serif; font-weight:700; color:#111; text-decoration:none; display:block; margin-bottom:8px;" href="{{ post.url | relative_url }}">{{ post.title | escape }}</a>
        <a class="post-excerpt-link" href="{{ post.url | relative_url }}">{{ post.excerpt | strip_html | truncate: 120 }}</a>
      </li>
    {% endfor %}
  </ul>

</div>
